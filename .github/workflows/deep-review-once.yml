name: Revision profunda THINKING (un solo uso)
# Disparo MANUAL de UN SOLO USO. Re-evalua los matches con el modelo THINKING (Kimi) en las 6 keys:
# RADAR_MODEL=Kimi hace que los 4 'fast' tambien corran Kimi (no Maverick) -> revision detallada y
# thinking de CADA trabajo, y reenvia solo los que pasan el filtro.
# SEGURIDAD (blindado, igual que el reenvio anterior):
#   - permissions: contents: read -> NO puede commitear: IMPOSIBLE que toque el seen.json del repo.
#   - vacia seen.json SOLO en el runner efimero (no se commitea).
#   - NO tiene paso de commit. Corre radar.py/criterios/evaluar TAL CUAL (solo cambia el modelo via env).
#   - workflow_dispatch only -> nunca corre solo.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: job-radar
  cancel-in-progress: false

jobs:
  deep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Vaciar seen SOLO en el runner (NO se commitea)
        run: echo "[]" > seen.json
      - name: Revision profunda con THINKING en las 6 keys
        env:
          RADAR_MODEL: moonshotai/kimi-k2.6   # los 4 'fast' tambien corren Kimi -> 6 keys thinking
          RADAR_MIN_INTERVAL: '4.0'           # ~15 RPM/key: ritmo bajo en las 6 para que Kimi no de 429
          RADAR_THINK_INTERVAL: '4.0'         # idem para el pool think (deep pass)
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_API_KEY_2: ${{ secrets.NVIDIA_API_KEY_2 }}
          NVIDIA_API_KEY_3: ${{ secrets.NVIDIA_API_KEY_3 }}
          NVIDIA_API_KEY_4: ${{ secrets.NVIDIA_API_KEY_4 }}
          NVIDIA_API_KEY_5: ${{ secrets.NVIDIA_API_KEY_5 }}
          NVIDIA_API_KEY_6: ${{ secrets.NVIDIA_API_KEY_6 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python radar.py
      # SIN paso de commit a proposito: el seen.json del repo NO se toca.
